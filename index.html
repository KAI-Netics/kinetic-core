<!-- INTAKE FORM -->
<div class="section card">
    <h2>Request Services</h2>
    <p>
        Tell us what you need support with. KAI-Netics will review your request and follow up.
    </p>

    <form action="https://formspree.io/f/mbdwooqr" method="POST">
        
        <!-- High-value subject line -->
        <input type="hidden" name="_subject" value="KAI-Netics New Intake Request">

        <p>
            <label>Name</label><br>
            <input type="text" name="name" required style="width:100%; padding:10px;">
        </p>

        <p>
            <label>Organization</label><br>
            <input type="text" name="organization" style="width:100%; padding:10px;">
        </p>

        <p>
            <label>Email</label><br>
            <input type="email" name="email" required style="width:100%; padding:10px;">
        </p>

        <p>
            <label>What do you need?</label><br>
            <select name="service" required style="width:100%; padding:10px;">
                <option value="">Select one</option>
                <option>Infrastructure / Cloud Transformation</option>
                <option>Cybersecurity / Compliance</option>
                <option>Drone Inspection / Site Assessment</option>
                <option>Autonomous Systems Strategy</option>
                <option>AI / Workflow Automation</option>
                <option>Partnership / Other</option>
            </select>
        </p>

        <p>
            <label>Message</label><br>
            <textarea name="message" rows="5" required style="width:100%; padding:10px;"></textarea>
        </p>

        <button type="submit" class="button">Submit Request</button>
    </form>
</div>
